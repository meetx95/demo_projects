<html lang="eng">

<head>
  <title>GLOW BUTTON</title>
  <style>
    html,
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #161616;
      overflow: hidden;
      /* transform: scale(1.5); */
    }

    /* button */
    .btn0 {
      margin: 100px;
      padding: 15px 40px;
      border: none;
      outline: none;
      color: #FFF;
      cursor: pointer;
      position: relative;
      z-index: 0;
      border-radius: 12px;
      -webkit-border-radius: ;
      -moz-border-radius: ;
      -ms-border-radius: ;
      -o-border-radius: ;
    }

    .btn0::after {
      content: "";
      z-index: -1;
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #333;
      left: 0;
      top: 0;
      border-radius: 10px;
      -webkit-border-radius: ;
      -moz-border-radius: ;
      -ms-border-radius: ;
      -o-border-radius: ;
    }

    /* glow */
    .btn0::before {
      content: "";
      background: linear-gradient(45deg, #FF0000, #FF7300, #FFFB00, #48FF00, #00FFD5, #002BFF, #FF00C8, #FF0000);
      position: absolute;
      top: -2px;
      left: -2px;
      background-size: 600%;
      z-index: -1;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      filter: blur(8px);
      animation: glowing0 20s linear infinite;
      transition: opacity .3s ease-in-out;
      border-radius: 10px;
      opacity: 0;
      -webkit-animation: glowing0 20s linear infinite;
      -webkit-transition: opacity .3s ease-in-out;
      -ms-transition: opacity .3s ease-in-out;
      -o-transition: opacity .3s ease-in-out;
      -webkit-border-radius: 10px;
      -moz-border-radius: 10px;
      -ms-border-radius: 10px;
      -o-border-radius: 10px;
      -webkit-filter: blur(8px);
      -moz-transition: opacity .3s ease-in-out;
      -ms-transition: opacity .3s ease-in-out;
      -o-transition: opacity .3s ease-in-out;
    }

    @keyframes glowing0 {
      0% {
        background-position: 0 0;
      }

      50% {
        background-position: 400% 0;
      }

      100% {
        background-position: 0 0;
      }
    }

    /* hover */
    .btn0:hover::before {
      opacity: 1;
    }

    .btn0:active:after {
      background: transparent;
    }

    .btn0:active {
      color: #000000;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <button class="btn0">LoginPage</button>
  <button class="btn0">Home</button>
  <button class="btn0">Log.in</button>
  <button class="btn0">Sign.in</button>
</body>

</html>
