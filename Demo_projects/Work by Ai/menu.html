<html>
<head>
  <title>Chat Message</title>
</head>
<body>
  <div class="chat-container" id="appRoot">
    <div class="chat-header">
      <h1>DeliverChat <span>live</span></h1>
      <div class="chat-stats" id="counterDisplay"> 0 messages</div>
    </div>
    <div class="messages-panel" id="messagesContainer">
      <div class="empty-state">No chats</div>
    </div>
    <div class="compose-area">
      <div class="input-group">
        <textarea class="message-input" id="chatMessageInput" rows="2"
          placeholder="Write your message..."></textarea>
        <button class="send-btn" id="sendMessageBtn">Deliver message</button>
      </div>
    </div>
    <footer>Edit or delete any chat • instantly updated</footer>
  </div>
</body>

</html>
<script>
let messages = [];

function loadMessagesFromStorage() {
  const stored = localStorage.getItem("deliverchat_messages");
  if (stored) {
    try {
      messages = JSON.parse(stored);
      messages = messages.map(msg => ({
        ...msg,
        updatedAt: msg.updatedAt || null
      }));
      return;
    } catch (e) { console.warn(e); }
  }
  messages = [
    {
      id: "msg1",
      text: "Hey! Welcome to DeliverChat — you can update or delete any message!",
      createdAt: new Date(Date.now() - 3600000).toISOString(),
      updatedAt: null
    },
    {
      id: "msg2",
      text: "Click the icon to edit, or to remove. Changes save automatically.",
      createdAt: new Date(Date.now() - 1800000).toISOString(),
      updatedAt: null
    },
    {
      id: "msg3",
      text: "All messages stay in your browser (localStorage). Deploy on Vercel instantly!",
      createdAt: new Date(Date.now() - 600000).toISOString(),
      updatedAt: null
    }
  ];
  saveMessagesToStorage();
}

function saveMessagesToStorage() {
  localStorage.setItem("deliverchat_messages", JSON.stringify(messages));
}

function formatTime(isoString, updatedAt = null) {
  const date = new Date(isoString);
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  let timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let dateStr = isToday ? `Today ${timeStr}` : `${date.toLocaleDateString()} ${timeStr}`;
  if (updatedAt) {
    const updDate = new Date(updatedAt);
    const updTime = updDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return `${dateStr} • edited ${updTime}`;
  }
  return `${dateStr}`;
}

function addMessage(text) {
  if (!text || text.trim() === "") return false;
  const newMessage = {
    id: Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6),
    text: text.trim(),
    createdAt: new Date().toISOString(),
    updatedAt: null
  };
  messages.unshift(newMessage);
  messages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  saveMessagesToStorage();
  renderMessages();
  return true;
}

function updateMessage(id, newText) {
  if (!newText || newText.trim() === "") return false;
  const index = messages.findIndex(m => m.id === id);
  if (index === -1) return false;
  messages[index].text = newText.trim();
  messages[index].updatedAt = new Date().toISOString();
  saveMessagesToStorage();
  renderMessages();
  return true;
}

function deleteMessage(id) {
  messages = messages.filter(m => m.id !== id);
  saveMessagesToStorage();
  renderMessages();
  return true;
}

let currentlyEditingId = null;
let editTextBuffer = "";

function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (!container) return;

  const counterSpan = document.getElementById('counterDisplay');
  if (counterSpan) {
    const total = messages.length;
    counterSpan.innerText = `${total} message${total !== 1 ? 's' : ''}`;
  }

  if (messages.length === 0) {
    container.innerHTML = `<div class="empty-state">No chats</div>`;
    return;
  }

  let html = '';
  for (let msg of messages) {
    const isEditing = (currentlyEditingId === msg.id);
    const timestampDisplay = formatTime(msg.createdAt, msg.updatedAt);
    if (isEditing) {
      html += `
              <div class="message-card" data-message-id="${msg.id}">
                  <div class="message-content" style="width:100%;">
                      <textarea class="edit-input" id="edit-textarea-${msg.id}" rows="2" placeholder="Edit your message...">${escapeHtml(msg.text)}</textarea>
                      <div class="edit-actions">
                          <button class="btn-icon save" data-action="save-edit" data-id="${msg.id}">Save</button>
                          <button class="btn-icon cancel" data-action="cancel-edit" data-id="${msg.id}">✖ Cancel</button>
                      </div>
                  </div>
                  <div class="message-actions">
                      <!-- small placeholder actions disabled during edit mode, but we keep for style -->
                  </div>
              </div>
      `; 
    } else {
      html += `
              <div class="message-card" data-message-id="${msg.id}">
                  <div class="message-content">
                      <div class="message-text">${escapeHtml(msg.text)}</div>
                      <div class="message-meta">
                          <span class="timestamp">${timestampDisplay}</span>
                          ${msg.updatedAt ? '<span class="edited-badge" style="background:#eef2ff; padding:2px 8px; border-radius:20px;">✏️ edited</span>' : ''}
                      </div>
                  </div>
                  <div class="message-actions">
                      <button class="btn-icon edit" data-action="start-edit" data-id="${msg.id}" title="Edit message">✏️ Edit</button>
                      <button class="btn-icon delete" data-action="delete" data-id="${msg.id}" title="Delete message">🗑️ Delete</button>
                  </div>
              </div>
      `;
    }
  }
  container.innerHTML = html;

  container.querySelectorAll('.btn-icon').forEach(btn => {
    btn.removeEventListener('click', handleButtonClick);
    btn.addEventListener('click', handleButtonClick);
  });
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function (m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
    return c;
  });
}

// central event handler for dynamic buttons
function handleButtonClick(event) {
  const btn = event.currentTarget;
  const action = btn.getAttribute('data-action');
  const id = btn.getAttribute('data-id');
  if (!action) return;

  if (action === 'delete' && id) {
    // confirmation sweet but native confirm
    if (confirm("❓ Delete this message permanently?")) {
      deleteMessage(id);
      if (currentlyEditingId === id) currentlyEditingId = null;
    }
  }
  else if (action === 'start-edit' && id) {
    // set editing mode
    currentlyEditingId = id;
    renderMessages();
    // auto focus the textarea after render (tiny delay for DOM)
    setTimeout(() => {
      const textarea = document.getElementById(`edit-textarea-${id}`);
      if (textarea) {
        textarea.focus();
        textarea.setSelectionRange(textarea.value.length, textarea.value.length);
      }
    }, 30);
  }
  else if (action === 'save-edit' && id) {
    // get new text from textarea element
    const textareaElem = document.getElementById(`edit-textarea-${id}`);
    if (textareaElem) {
      const newVal = textareaElem.value;
      if (newVal.trim() === "") {
        alert("Message cannot be empty.");
        return;
      }
      updateMessage(id, newVal);
      currentlyEditingId = null;
      renderMessages();
    } else {
      // fallback
      currentlyEditingId = null;
      renderMessages();
    }
  }
  else if (action === 'cancel-edit' && id) {
    currentlyEditingId = null;
    renderMessages();
  }
  event.stopPropagation();
}

function sendNewMessage() {
  const inputEl = document.getElementById('chatMessageInput');
  const rawText = inputEl.value;
  if (!rawText || rawText.trim() === "") {
    // optional subtle warning
    inputEl.style.borderColor = "#f97316";
    setTimeout(() => { inputEl.style.borderColor = "#e2e8f0"; }, 600);
    return;
  }
  const success = addMessage(rawText);
  if (success) {
    inputEl.value = "";
    inputEl.focus();
    // scroll to top because newest appears on top (perfect)
    const container = document.getElementById('messagesContainer');
    if (container) container.scrollTop = 0;
    // reset any editing mode if active (global)
    if (currentlyEditingId) {
      currentlyEditingId = null;
      renderMessages();
    }
  } else {
    alert("Could not send empty message.");
  }
}

function initEventDelegation() {
  const sendBtn = document.getElementById('sendMessageBtn');
  if (sendBtn) sendBtn.addEventListener('click', sendNewMessage);
  const textInput = document.getElementById('chatMessageInput');
  if (textInput) {
    textInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        sendNewMessage();
      }
    });
  }
}

function init() {
  loadMessagesFromStorage();
  renderMessages();
  initEventDelegation();
  window.addEventListener('beforeunload', () => {
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
